<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auth - Site d'Exercices</title>
</head>
<body>
    <h1>Test Authentication</h1>
    <div id="test-results"></div>

    <script src="script.js"></script>
    <script>
        const results = document.getElementById('test-results');

        function log(message) {
            results.innerHTML += '<p>' + message + '</p>';
        }

        // Test registration
        log('Testing registration...');
        const registerResult = register('testuser', 'testpass');
        log('Registration result: ' + registerResult);

        // Test login
        log('Testing login...');
        const loginResult = login('testuser', 'testpass');
        log('Login result: ' + loginResult);

        // Test current user
        log('Testing getCurrentUser...');
        const user = getCurrentUser();
        log('Current user: ' + (user ? user.username : 'null'));

        // Test isLoggedIn
        log('Testing isLoggedIn...');
        log('Is logged in: ' + isLoggedIn());

        // Test logout
        log('Testing logout...');
        logout();
        log('After logout - Is logged in: ' + isLoggedIn());
    </script>
</body>
</html>
